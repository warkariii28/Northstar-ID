<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title> {% block title%} {{ title }} {% endblock %} </title>
</head>
<body>
    <div class="container-fluid app-shell px-3 px-lg-4">
        <div class="ambient-orb orb-one"></div>
        <div class="ambient-orb orb-two"></div>
        <div class="container shell-inner">
            <header class="site-nav">
                <div class="nav-panel d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
                    <a href="{{ url_for('index') }}" class="brand-chip">
                        <span class="brand-dot"></span>
                        {{ config['APP_NAME'] }}
                    </a>
                    <nav class="nav-links">
                        <a class="nav-link-pill" href="{{ url_for('index') }}">Home</a>
                        {% if current_user.is_authenticated %}
                        <span class="nav-link-pill">Signed in as {{ current_user.username }}</span>
                        <a class="btn btn-outline-ink" href="{{ url_for('logout') }}">Log out</a>
                        {% else %}
                        <a class="nav-link-pill" href="{{ url_for('login') }}">Login</a>
                        <a class="btn btn-accent" href="{{ url_for('register') }}">Create account</a>
                        {% endif %}
                    </nav>
                </div>
            </header>

            {% block content%}
            {% endblock %}

            <footer class="page-footer">
                Built with Flask, SQLAlchemy, WTForms, and Flask-Login.
            </footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
