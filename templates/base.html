<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #f3efe7;
            --ink: #11213a;
            --muted: #5e6b7f;
            --panel: rgba(255, 255, 255, 0.82);
            --line: rgba(17, 33, 58, 0.12);
            --accent: #e76f51;
            --accent-deep: #cf5a3d;
            --accent-soft: #ffe2d9;
            --success-soft: #dbf5ea;
        }

        body {
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(231, 111, 81, 0.22), transparent 26%),
                radial-gradient(circle at bottom right, rgba(17, 33, 58, 0.18), transparent 30%),
                linear-gradient(135deg, #fcfaf7 0%, var(--bg) 52%, #e9eef6 100%);
        }

        .app-shell {
            min-height: 100vh;
        }

        .glass-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: 0 24px 70px rgba(17, 33, 58, 0.12);
            backdrop-filter: blur(14px);
        }

        .brand-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(17, 33, 58, 0.1);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .brand-dot {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #f4a261);
            box-shadow: 0 0 0 4px rgba(231, 111, 81, 0.15);
        }

        .headline {
            font-size: clamp(2.4rem, 5vw, 4.8rem);
            line-height: 0.95;
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .subtext {
            color: var(--muted);
            font-size: 1.05rem;
        }

        .btn-accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-accent:hover,
        .btn-accent:focus {
            background: var(--accent-deep);
            border-color: var(--accent-deep);
            color: #fff;
        }

        .btn-outline-ink {
            border-color: rgba(17, 33, 58, 0.2);
            color: var(--ink);
        }

        .btn-outline-ink:hover,
        .btn-outline-ink:focus {
            background: rgba(17, 33, 58, 0.06);
            color: var(--ink);
        }

        .feature-card {
            height: 100%;
            padding: 1.25rem;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.58);
            border: 1px solid rgba(17, 33, 58, 0.08);
        }

        .feature-kicker {
            color: var(--accent-deep);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .auth-side {
            background: linear-gradient(180deg, rgba(17, 33, 58, 0.96), rgba(25, 56, 95, 0.92));
            color: #fff;
            border-radius: 28px;
        }

        .auth-badge {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.16);
            color: #fff;
        }

        .form-control {
            min-height: 3.25rem;
            border-radius: 16px;
            border-color: rgba(17, 33, 58, 0.12);
            padding-left: 1rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(231, 111, 81, 0.18);
            border-color: rgba(231, 111, 81, 0.5);
        }

        .mini-stat {
            padding: 1rem 1.1rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .success-panel {
            background: var(--success-soft);
            border: 1px solid rgba(62, 138, 104, 0.18);
            border-radius: 20px;
        }
    </style>
    <title> {% block title%} {{ title }} {% endblock %} </title>
</head>

<body>
    <div class="container-fluid app-shell px-3 px-lg-4">
        {% block content%}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>

</html>
